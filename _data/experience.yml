   This is a Master's Research Project supervised by Professor [Marvin Doyley](http://www.hajim.rochester.edu/ece/people/faculty/doyley_marvin/index.html),
   focusing on develop <mark>Medical Image Segmentation</mark> algorithm using Machine Learning Method. Available data are Carotid Ultrasound Image, and our goal is 
   to segment the diseased area to help doctors diagnosis in an easier way.   

   Our work can be divided into 2 parts. 1. Design of the Dataset: 
   Analysis Peak Signal-to-Noise Ratio(PSNR) and Structural SIMilarity(SSIM) of images; remove similar and noisy images; design and split 
   balanced train/test dataset. 2. Model Development: Design evaluation matric; implement and compare the baseline performance of U-Net and its variant.
   Unfortunately, the project is now suspended because of COVID-19.

