   I was selected for the Intellengent Student Plan in SJTU and attend MARC advised by [Junping Geng](http://ant.sjtu.edu.cn/homepage/jpgeng/).
   My research focus on <mark>Surface Antenna Design</mark> based on Spoof Surface Plasmon Polariton(SSPP). I firstly reviewed related papers, describe 
   its propagation mechanism and derive formulas based on electromagnetic field knowledge. Then I designed the geometric structure, materials for 
   a planar antenna, and used CST to simulate its performance. Finally, based on the performance, refine the parameters of the antenna. This research
   was also used for my bachelor's thesis.

