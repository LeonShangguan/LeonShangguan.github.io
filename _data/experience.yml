   SJTU offers bachelor students opportunitis to participate in research programs(PRP), which allows me to join ICNE and supervised by
   [Hua Yang](https://icne.sjtu.edu.cn/info/1059/1073.htm). Our research focused on <mark>Dataset Construction</mark> for Pedestrian Re-identification. I worked
   on data cleaning, image preprocessing, and data labeling. Together with my collegues, we firstly extract frames from surveillance camera vedios, then drop images with bad quality
   or missing data. After that, we performed gaussian filter and motion filter to enhance the images. Finally, we labeled the images and 
   balanced the amount of images in different types.