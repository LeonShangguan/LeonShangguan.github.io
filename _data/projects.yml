    Actor-Action Video Classification Challenge
  description: | # this will include new lines to allow paragraphs
    Actor-Action video classification challenge was held as a final project in CSC449 Machine Vision course (Spring 2020) at University of Rochester. 
    Together with my teammates, we won the ***1st*** place within the course period. The actor-action classification challenge is to classify the 
    key frames in the A2D videos into actor-action pairs, and more than one actor may occur in a frame, making it a multi-label classification task.
    Our method was compiled in the [technical report](https://arxiv.org/pdf/2008.00141.pdf).
